# fly.toml app configuration file generated for whatsapp-bookmarks on 2026-03-14T16:31:51+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'whatsapp-bookmarks'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/bookmarks.db'
  NODE_ENV = 'production'
  PORT = '3000'
  WA_AUTH_DIR = '/data/whatsapp_auth'

[[mounts]]
  source = 'whatsapp_data'
  destination = '/data'
  initial_size = '1gb'

[[services]]
  protocol = 'tcp'
  internal_port = 3000
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
